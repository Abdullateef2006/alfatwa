<style>
    .pagination-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 2rem 0;
        padding: 1rem;
    }

    .pagination-container {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--bg-card);
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
    }

    .page-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        border-radius: 9999px;
        color: var(--text-primary);
        font-weight: 600;
        transition: var(--transition);
        background: transparent;
        text-decoration: none;
    }

    .page-btn:hover {
        background-color: var(--primary-light);
        color: var(--primary-hover);
    }

    .page-current {
        font-weight: 600;
        color: var(--text-secondary);
        font-size: 0.95rem;
        padding: 0 1rem;
        border-left: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
    }
</style>

<div class="pagination-wrapper">
    <div class="pagination-container">
        {% if page.has_previous %}
        <a href="?page={{ page.previous_page_number }}" class="page-btn">
            <i class="fa-solid fa-arrow-left"></i> Previous
        </a>
        {% else %}
        <span class="page-btn" style="opacity: 0.5; cursor: not-allowed;">
            <i class="fa-solid fa-arrow-left"></i> Previous
        </span>
        {% endif %}

        <span class="page-current">Page {{page.number}} of {{ page.paginator.num_pages }}</span>

        {% if page.has_next %}
        <a href="?page={{ page.next_page_number }}" class="page-btn">
            Next <i class="fa-solid fa-arrow-right"></i>
        </a>
        {% else %}
        <span class="page-btn" style="opacity: 0.5; cursor: not-allowed;">
            Next <i class="fa-solid fa-arrow-right"></i>
        </span>
        {% endif %}
    </div>
</div>
